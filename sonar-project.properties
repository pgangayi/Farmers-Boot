# SonarQube project configuration
sonar.projectKey=farmers-boot
sonar.projectName=Farmers Boot
sonar.projectVersion=0.1.0

# For SonarCloud (uncomment and replace with your organization)
sonar.organization=dummy-org

# For local SonarQube (uncomment if running locally)
# sonar.host.url=http://localhost:9000

# Sources and tests
sonar.sources=apps/web/src,packages/shared/src,supabase/functions
sonar.tests=apps/web/src,packages/shared/src
sonar.inclusions=**/*.js,**/*.jsx,**/*.ts,**/*.tsx,**/*.json
sonar.exclusions=node_modules/**,dist/**,build/**,coverage/**,.git/**,archive/**,performance-tests/**

# Language-specific properties
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info,packages/shared/coverage/lcov.info
sonar.typescript.lcov.reportPaths=apps/web/coverage/lcov.info,packages/shared/coverage/lcov.info

# Coverage
sonar.coverage.exclusions=**/*.test.js,**/*.test.ts,**/*.spec.js,**/*.spec.ts,**/*.stories.js,**/*.stories.ts

# Encoding
sonar.sourceEncoding=UTF-8
